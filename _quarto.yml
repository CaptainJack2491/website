project:
  type: website
  output-dir: public

# This tells Quarto: "Every time you see a .qmd, make an HTML and a TXT"
format:
  html:
    from: markdown+autolink_bare_uris
    theme: none
    minimal: true
    embed-resources: true
    css: terminal.css

  plain: 
    output-ext: txt  # This forces the extension to .txt instead of .plain
